<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生活ガイド | Nihon Gateway</title>
  <meta name="description" content="手続きや暮らしに役立つガイドを掲載します。">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://yoshi1234567890.github.io/nihon-gateway/ja/guides/">
  <link rel="stylesheet" href="../../assets/css/style.css">
<script>
(function () {
  var segments = location.pathname.split('/').filter(Boolean);
  if (segments.length && /\.html$/i.test(segments[segments.length - 1])) segments.pop();

  var localeIndex = -1;
  for (var i = 0; i < segments.length; i++) {
    if (segments[i] === 'ja' || segments[i] === 'de') { localeIndex = i; break; }
  }

  var depth = localeIndex >= 0 ? (segments.length - localeIndex) : Math.max(segments.length - 1, 0);
  var prefix = depth === 0 ? './' : '../'.repeat(depth);

  var css = document.createElement('link');
  css.rel = 'stylesheet';
  css.href = prefix + 'assets/css/cookie-consent.css';
  document.head.appendChild(css);

  var js = document.createElement('script');
  js.src = prefix + 'assets/js/cookie-consent.js';
  js.defer = true;
  document.head.appendChild(js);
})();
</script>
</head>

<body>
  <header class="site-header">
    <div class="container">
      <h1>生活ガイド</h1>
      <p>手続きや暮らしに役立つガイドを掲載します。</p>
    </div>
  </header>

  <main class="container">
    <div class="content-box">
      <p>このページのコンテンツは準備中です。</p>
      <ul class="nav-links">
        <li><a href="../index.html">日本語トップへ戻る</a></li>
      </ul>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 Nihon Gateway</p>
    </div>
  </footer>

  <script src="../../assets/js/main.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投稿フォーム</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 880px;
      margin: auto;
      padding: 20px;
      background: #fdf8f2
    }

    form {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 18px
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 10px
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #111;
      color: #fff
    }
  </style>
</head>

<body>
  <h1>投稿フォーム</h1>
  <form id="postForm" enctype="multipart/form-data"><input name="action" type="hidden"
      value="submitPost"><label>カテゴリ1</label><select name="category1" id="category1"
      required></select><label>カテゴリ2</label><select name="category2" id="category2"
      required></select><label>タイトル</label><input name="title" required><label>本文</label><textarea name="body"
      required></textarea><label>国</label><input name="country" value="Germany"><label>地域</label><input
      name="region"><label>都市</label><input name="city" required><label>ニックネーム</label><input name="nickname"
      required><label>非公開メールアドレス</label><input name="contact_email_private" type="email"
      required><label>非公開電話番号</label><input name="contact_phone_private"><label>希望連絡方法</label><input
      name="preferred_contact_method"><label>価格</label><input name="price"><label>イベント日</label><input name="event_date"
      type="date"><label>利用可能日</label><input name="availability_date" type="date"><label>画像1</label><input name="image1"
      type="file" accept=".jpg,.jpeg,.png,.webp"><label>画像2</label><input name="image2" type="file"
      accept=".jpg,.jpeg,.png,.webp"><label>画像3</label><input name="image3" type="file"
      accept=".jpg,.jpeg,.png,.webp"><label><input type="checkbox" required> 利用ルールに同意します</label><button
      type="submit">送信する</button></form>
  <script>const GAS_URL = 'https://script.google.com/macros/s/AKfycbwvGmCKVjbWak1xmqU3li33sS_eSx-g5eZU9NUPUYA_9YD7E2NmwUHe9a0SrG6YFBZt/exec'; async function fetchJson(url, opt = {}) { const r = await fetch(url, opt); if (!r.ok) throw new Error('Network'); return await r.json(); } let categoryMap = {}; async function loadCategories() { const d = await fetchJson(GAS_URL + '?action=getCategories'); const rows = d.categories || []; categoryMap = rows.reduce((a, r) => { if (!a[r.category1]) a[r.category1] = []; a[r.category1].push(r.category2); return a; }, {}); const c1 = document.getElementById('category1'); c1.innerHTML = '<option value="">選択してください</option>' + Object.keys(categoryMap).map(v => `<option value="${v}">${v}</option>`).join(''); } function updateCategory2() { const c1 = document.getElementById('category1').value, c2 = document.getElementById('category2'); const list = categoryMap[c1] || []; c2.innerHTML = '<option value="">選択してください</option>' + list.map(v => `<option value="${v}">${v}</option>`).join(''); } document.getElementById('category1').addEventListener('change', updateCategory2); document.getElementById('postForm').addEventListener('submit', async e => { e.preventDefault(); const fd = new FormData(e.target); const r = await fetch(GAS_URL, { method: 'POST', body: fd }); const d = await r.json(); if (d.ok) location.href = './thanks.html'; else alert('送信に失敗しました'); }); loadCategories();</script>
</body>

</html>

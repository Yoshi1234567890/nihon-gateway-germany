<style>:root{--cream:#fdf8f2;--ink:#1a1014;--muted:#6b5e68;--border:#ede5e0;--card-shadow:0 10px 30px rgba(26,16,20,.07);--max:1280px;--brand:#d84b6a}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Outfit','Noto Sans JP',sans-serif;background:linear-gradient(rgba(247,248,250,.78), rgba(247,248,250,.82)),url('../../assets/images/brand/site-bg.jpg') center top/cover fixed no-repeat,var(--cream);color:var(--ink)}.container{width:min(var(--max), calc(100% - 32px));margin:0 auto}.site-header{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.84);backdrop-filter:blur(12px);border-bottom:1px solid rgba(230,234,240,.92)}.header-inner{min-height:72px;display:flex;align-items:center;justify-content:space-between;gap:20px}.brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit}.brand-logo{width:120px;height:70px;object-fit:contain}.brand-title{font-size:14px;font-weight:800}.brand-sub{font-size:12px;color:var(--muted)}.header-nav a{margin-left:8px;padding:8px 12px;border:1px solid #dce4ee;border-radius:999px;text-decoration:none;color:#34414d;background:#fff}.wrap{width:min(900px, calc(100% - 32px));margin:24px auto 56px}.panel{background:#fff;border:1px solid var(--border);border-radius:20px;box-shadow:var(--card-shadow);padding:20px}input,textarea{width:100%;padding:10px;margin:8px 0 14px;border:1px solid #ccc;border-radius:10px}button{padding:12px 18px;border:none;border-radius:10px;background:#111;color:#fff}</style>

<main class="wrap"><div class="panel"><p><a href="/nihon-gateway-germany/ja/community/">← 掲示板へ戻る</a></p><h1>投稿者に連絡する</h1><form id="contactForm"><input name="action" type="hidden" value="submitInquiry"><input name="post_id" id="post_id" type="hidden"><label>あなたの名前</label><input name="sender_name" required><label>あなたのメール</label><input name="sender_email" type="email" required><label>件名</label><input name="subject" required><label>メッセージ</label><textarea name="message" required></textarea><button type="submit">送信する</button></form></div></main>
<script>const GAS_URL='https://script.google.com/macros/s/AKfycbwvGmCKVjbWak1xmqU3li33sS_eSx-g5eZU9NUPUYA_9YD7E2NmwUHe9a0SrG6YFBZt/exec';document.getElementById('post_id').value=new URLSearchParams(location.search).get('post_id')||'';document.getElementById('contactForm').addEventListener('submit',async(e)=>{e.preventDefault();const fd=new FormData(e.target);const res=await fetch(GAS_URL,{method:'POST',body:fd});const data=await res.json();if(data.ok)location.href='/nihon-gateway-germany/ja/community/thanks/';else alert('送信に失敗しました');});</script>

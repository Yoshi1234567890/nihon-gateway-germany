<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>投稿者に連絡する | Nihon Gateway Germany</title><link rel="icon" type="image/jpeg" href="../../assets/images/brand/favicon.png"><style>.site-header{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.84);backdrop-filter:blur(12px);border-bottom:1px solid rgba(230,234,240,.92)}.container{width:min(1280px,calc(100% - 32px));margin:0 auto}.header-inner{min-height:72px;display:flex;align-items:center}.brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit}.brand-logo{width:120px;height:70px;object-fit:contain}.brand-title{font-size:14px;font-weight:800;letter-spacing:.08em}.brand-sub{display:block;font-size:12px;color:#6b5e68}.page-wrap{width:min(980px,calc(100% - 32px));margin:24px auto}.page-footer{width:min(1280px,calc(100% - 32px));margin:0 auto 24px;border:1px solid #dce4ee;border-radius:20px;background:linear-gradient(135deg,#fbfdff,#f6f9fc);padding:24px}.footer-inner{display:flex}.footer-left{display:flex;gap:16px}.footer-logo{width:112px;height:112px;object-fit:contain}.footer-title{font-size:14px;font-weight:800}.footer-sub,.footer-meta{font-size:13px;color:#6b5e68}body{background:linear-gradient(rgba(247,248,250,.78), rgba(247,248,250,.82)),url('../../assets/images/brand/site-bg.jpg') center top / cover fixed no-repeat,#fdf8f2!important}</style>
  <style>
    body{font-family:Arial,sans-serif;padding:24px}
    form{background:#fff;border:1px solid #ddd;border-radius:16px;padding:18px}
    input,textarea{width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:10px}
    button{padding:12px 18px;border:none;border-radius:10px;background:#111;color:#fff}
  </style>
<script>
(function () {
  var segments = location.pathname.split('/').filter(Boolean);
  if (segments.length && /\.html$/i.test(segments[segments.length - 1])) segments.pop();

  var localeIndex = -1;
  for (var i = 0; i < segments.length; i++) {
    if (segments[i] === 'ja' || segments[i] === 'de') { localeIndex = i; break; }
  }

  var depth = localeIndex >= 0 ? (segments.length - localeIndex) : Math.max(segments.length - 1, 0);
  var prefix = depth === 0 ? './' : '../'.repeat(depth);

  var css = document.createElement('link');
  css.rel = 'stylesheet';
  css.href = prefix + 'assets/css/cookie-consent.css';
  document.head.appendChild(css);

  var js = document.createElement('script');
  js.src = prefix + 'assets/js/cookie-consent.js';
  js.defer = true;
  document.head.appendChild(js);
})();
</script>
</head>
<body><header class="site-header"><div class="container header-inner"><a class="brand" href="/nihon-gateway-germany/ja/"><img class="brand-logo" src="../../assets/images/brand/logo_header.png" alt="logo"><span><span class="brand-title">NIHON GATEWAY GERMANY</span><span class="brand-sub">ドイツと日本をつなぐ総合ポータル</span></span></a></div></header><main class="page-wrap">
  <p><a href="./index.html">← 掲示板へ戻る</a></p>
  <h1>投稿者に連絡する</h1>
  <form id="contactForm">
    <input name="action" type="hidden" value="submitInquiry">
    <input name="post_id" id="post_id" type="hidden">
    <label>あなたの名前</label><input name="sender_name" required>
    <label>あなたのメール</label><input name="sender_email" type="email" required>
    <label>件名</label><input name="subject" required>
    <label>メッセージ</label><textarea name="message" required></textarea>
    <button type="submit">送信する</button>
  </form>
  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwvGmCKVjbWak1xmqU3li33sS_eSx-g5eZU9NUPUYA_9YD7E2NmwUHe9a0SrG6YFBZt/exec';
    document.getElementById('post_id').value = new URLSearchParams(location.search).get('post_id') || '';
    document.getElementById('contactForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const res = await fetch(GAS_URL, { method:'POST', body: fd });
      const data = await res.json();
      if (data.ok) location.href = './thanks.html';
      else alert('送信に失敗しました');
    });
  </script>
</main><footer class="page-footer"><div class="footer-inner"><div class="footer-left"><img class="footer-logo" src="../../assets/images/brand/logo_footer.png" alt="logo"><div><div class="footer-title">NIHON GATEWAY GERMANY</div><div class="footer-sub">ドイツと日本をつなぐ総合ポータル</div><div class="footer-meta">© 2026 Nihon Gateway Germany</div></div></div></div></footer></body>
</html>

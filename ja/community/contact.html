<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>連絡する</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 760px;
      margin: auto;
      padding: 20px;
      background: #fdf8f2
    }

    form {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 18px
    }

    input,
    textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 10px
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #111;
      color: #fff
    }
  </style>
</head>

<body>
  <h1>投稿者に連絡する</h1>
  <form id="contactForm"><input name="action" type="hidden" value="submitInquiry"><input name="post_id" id="post_id"
      type="hidden"><label>あなたの名前</label><input name="sender_name" required><label>あなたのメール</label><input
      name="sender_email" type="email" required><label>件名</label><input name="subject"
      required><label>メッセージ</label><textarea name="message" required></textarea><button type="submit">送信する</button>
  </form>
  <script>const GAS_URL = 'https://script.google.com/macros/s/AKfycbwvGmCKVjbWak1xmqU3li33sS_eSx-g5eZU9NUPUYA_9YD7E2NmwUHe9a0SrG6YFBZt/exec'; async function fetchJson(url, opt = {}) { const r = await fetch(url, opt); if (!r.ok) throw new Error('Network'); return await r.json(); } document.getElementById('post_id').value = new URLSearchParams(location.search).get('post_id') || ''; document.getElementById('contactForm').addEventListener('submit', async e => { e.preventDefault(); const fd = new FormData(e.target); const r = await fetch(GAS_URL, { method: 'POST', body: fd }); const d = await r.json(); if (d.ok) location.href = './thanks.html'; else alert('送信に失敗しました'); });</script>
</body>

</html>

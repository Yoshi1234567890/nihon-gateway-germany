<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>通報する | Nihon Gateway Germany</title><link rel="icon" type="image/jpeg" href="../../assets/images/brand/favicon.png"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet"><style>body{font-family:'Outfit','Noto Sans JP',sans-serif;background:linear-gradient(rgba(247,248,250,.78), rgba(247,248,250,.82)),url('../../assets/images/brand/site-bg.jpg') center top/cover fixed no-repeat,#fdf8f2;margin:0}main{max-width:820px;margin:32px auto;padding:24px;background:#fff;border:1px solid #ddd;border-radius:16px}input,textarea,select{width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:10px}</style></head><body><main><p><a href="/nihon-gateway-germany/ja/community/">← 掲示板一覧へ戻る</a></p><h1>投稿を通報する</h1><form id="reportForm"><input name="action" type="hidden" value="submitReport"><input name="post_id" id="post_id" type="hidden"><label>理由</label><select name="reason" required><option value="">選択してください</option><option>スパム</option><option>不適切な内容</option><option>詐欺の疑い</option><option>重複投稿</option><option>その他</option></select><label>詳細</label><textarea name="detail"></textarea><label>あなたのメール（任意）</label><input name="reporter_email" type="email"><button type="submit">送信する</button></form></main><script>const GAS_URL='https://script.google.com/macros/s/AKfycbwvGmCKVjbWak1xmqU3li33sS_eSx-g5eZU9NUPUYA_9YD7E2NmwUHe9a0SrG6YFBZt/exec';document.getElementById('post_id').value=new URLSearchParams(location.search).get('post_id')||'';document.getElementById('reportForm').addEventListener('submit',async(e)=>{e.preventDefault();const fd=new FormData(e.target);const res=await fetch(GAS_URL,{method:'POST',body:fd});const data=await res.json();if(data.ok)location.href='/nihon-gateway-germany/ja/community/thanks/';else alert('送信に失敗しました');});</script></body></html>
